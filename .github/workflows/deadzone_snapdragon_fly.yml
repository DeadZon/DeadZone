name: DeadZone Snapdragon Fly Build

on:
  workflow_dispatch:
    inputs:
      codename:
        description: "Device codename (e.g. garnet, fuxi, aurora)"
        required: true
        type: string

      edition:
        description: "ROM edition"
        required: true
        type: choice
        default: free
        options:
          - free
          - gaming
          - legend
          - epic

      rom_source:
        description: "ROM source"
        required: true
        type: choice
        default: manual_url
        options:
          - manual_url
          - auto_latest

      rom_url:
        description: "Direct ROM ZIP/TGZ URL — required when rom_source=manual_url"
        required: false
        type: string

      mode:
        description: "Build mode"
        required: true
        type: choice
        default: execute
        options:
          - dry_run
          - execute

      upload_pixeldrain:
        description: "Upload final ROM ZIP to PixelDrain"
        required: true
        type: boolean
        default: true

      notify_telegram:
        description: "Send Telegram live updates"
        required: true
        type: boolean
        default: true

      enable_listmezo:
        description: "Enable ListMezo free app normalize (active for free edition only)"
        required: false
        type: boolean
        default: true

      listmezo_mode:
        description: "ListMezo mode: dry_run = scan+report only; execute = apply changes"
        required: false
        type: choice
        default: dry_run
        options:
          - dry_run
          - execute

      vm_cpus:
        description: "Fly VM CPU count (e.g. 4, 8)"
        required: false
        type: string
        default: "8"

      vm_memory:
        description: "Fly VM memory in MB (e.g. 8192, 16384)"
        required: false
        type: string
        default: "16384"

      fly_region:
        description: "Fly.io region (e.g. iad, lax, ord)"
        required: false
        type: string
        default: "iad"

      telegram_msg_id:
        description: "Existing Telegram message ID to edit (leave empty to send new)"
        required: false
        type: string

concurrency:
  group: deadzone-${{ github.workflow }}-${{ inputs.codename }}-${{ inputs.edition }}
  cancel-in-progress: true

jobs:
  fly-machine-run:
    name: "Snapdragon Fly | ${{ inputs.codename }} | ${{ inputs.edition }} | ${{ inputs.mode }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail

          CODENAME="${{ inputs.codename }}"
          CODENAME="$(echo "$CODENAME" | xargs)"

          if [ -z "$CODENAME" ]; then
            echo "[ERROR] codename is required. Enter a device codename like garnet or fuxi."
            exit 1
          fi

          for BAD in select_device_codename select_device device none null default; do
            if [ "$CODENAME" = "$BAD" ]; then
              echo "[ERROR] Invalid device codename: $CODENAME."
              echo "[ERROR] Please enter a real codename like garnet or fuxi."
              exit 1
            fi
          done

          EDITION="${{ inputs.edition }}"
          case "$EDITION" in
            free|gaming|legend|epic) ;;
            *) echo "[ERROR] Invalid edition: $EDITION. Must be one of: free, gaming, legend, epic."; exit 1 ;;
          esac

          MODE="${{ inputs.mode }}"
          case "$MODE" in
            dry_run|execute) ;;
            *) echo "[ERROR] Invalid mode: $MODE. Must be dry_run or execute."; exit 1 ;;
          esac

          ROM_SOURCE="${{ inputs.rom_source }}"
          case "$ROM_SOURCE" in
            manual_url|auto_latest) ;;
            *) echo "[ERROR] Invalid rom_source: $ROM_SOURCE. Must be manual_url or auto_latest."; exit 1 ;;
          esac

          ROM_URL="${{ inputs.rom_url }}"
          if [ "$ROM_SOURCE" = "manual_url" ] && [ "$MODE" = "execute" ]; then
            if [ -z "$ROM_URL" ]; then
              echo "[ERROR] rom_url is required when rom_source=manual_url and mode=execute."
              exit 1
            fi
            case "$ROM_URL" in
              http://*|https://*) ;;
              *) echo "[ERROR] rom_url must start with http:// or https://"; exit 1 ;;
            esac
          fi

          echo "[OK] codename   = $CODENAME"
          echo "[OK] edition    = $EDITION"
          echo "[OK] mode       = $MODE"
          echo "[OK] rom_source = $ROM_SOURCE"
          echo "[OK] rom_url    = ${ROM_URL:-(not required)}"
          echo "[OK] Inputs validated."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repo text files
        run: |
          set -euo pipefail
          python3 scripts/validate_repo_text_files.py

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_SNAPDRAGON_APP_NAME: ${{ secrets.FLY_SNAPDRAGON_APP_NAME }}
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "[ERROR] FLY_API_TOKEN secret is not set."
            echo "Set FLY_API_TOKEN in repository secrets with a Fly.io API token."
            exit 1
          fi
          RESOLVED_APP="${FLY_SNAPDRAGON_APP_NAME:-${FLY_APP_NAME:-deadzone-fly-snapdragon}}"
          echo "[OK] FLY_API_TOKEN present."
          echo "[OK] FLY_APP_NAME = ${RESOLVED_APP}"

      - name: Launch Fly machine (Snapdragon build)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_SNAPDRAGON_APP_NAME: ${{ secrets.FLY_SNAPDRAGON_APP_NAME }}
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
          TELEGRAM_SNAPDRAGON_BOT_TOKEN: ${{ secrets.TELEGRAM_SNAPDRAGON_BOT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_SNAPDRAGON_CHAT_ID: ${{ secrets.TELEGRAM_SNAPDRAGON_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SNAPDRAGON_GROUP_ID: ${{ secrets.TELEGRAM_SNAPDRAGON_GROUP_ID }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
        run: |
          set -euo pipefail

          CODENAME="${{ inputs.codename }}"
          CODENAME="$(echo "$CODENAME" | xargs)"
          EDITION="${{ inputs.edition }}"
          ROM_SOURCE="${{ inputs.rom_source }}"
          ROM_URL="${{ inputs.rom_url }}"
          MODE="${{ inputs.mode }}"
          UPLOAD_PD="${{ inputs.upload_pixeldrain }}"
          NOTIFY_TG="${{ inputs.notify_telegram }}"
          ENABLE_LM="${{ inputs.enable_listmezo }}"
          LM_MODE="${{ inputs.listmezo_mode || 'dry_run' }}"
          VM_CPUS="${{ inputs.vm_cpus || '8' }}"
          VM_MEM="${{ inputs.vm_memory || '16384' }}"
          FLY_REGION="${{ inputs.fly_region || 'iad' }}"
          TG_MSG_ID="${{ inputs.telegram_msg_id }}"

          [ -z "$UPLOAD_PD" ] && UPLOAD_PD="true"
          [ -z "$NOTIFY_TG" ] && NOTIFY_TG="true"
          [ -z "$ENABLE_LM" ] && ENABLE_LM="true"

          # Resolve app name from secrets with fallback
          RESOLVED_APP="${FLY_SNAPDRAGON_APP_NAME:-${FLY_APP_NAME:-deadzone-fly-snapdragon}}"

          # Resolve SoC-specific Telegram secrets with generic fallback
          RESOLVED_BOT_TOKEN="${TELEGRAM_SNAPDRAGON_BOT_TOKEN:-${TELEGRAM_BOT_TOKEN:-}}"
          RESOLVED_CHAT_ID="${TELEGRAM_SNAPDRAGON_CHAT_ID:-${TELEGRAM_CHAT_ID:-}}"
          RESOLVED_GROUP_ID="${TELEGRAM_SNAPDRAGON_GROUP_ID:-${TELEGRAM_GROUP_ID:-}}"

          echo "[FLY] Launching Snapdragon build machine"
          echo "[FLY] codename   = $CODENAME"
          echo "[FLY] edition    = $EDITION"
          echo "[FLY] mode       = $MODE"
          echo "[FLY] rom_source = $ROM_SOURCE"
          echo "[FLY] region     = $FLY_REGION"
          echo "[FLY] vm_cpus    = $VM_CPUS"
          echo "[FLY] vm_memory  = $VM_MEM MB"

          flyctl machine run . \
            --app "$RESOLVED_APP" \
            --dockerfile docker/Dockerfile.fly \
            --region "$FLY_REGION" \
            --vm-cpu-kind performance \
            --vm-cpus "$VM_CPUS" \
            --vm-memory "$VM_MEM" \
            --env DEADZONE_SOC=snapdragon \
            --env DEADZONE_DEVICE_CODENAME="$CODENAME" \
            --env DEADZONE_EDITION="$EDITION" \
            --env DEADZONE_ROM_SOURCE="$ROM_SOURCE" \
            --env DEADZONE_ROM_URL="$ROM_URL" \
            --env DEADZONE_MODE="$MODE" \
            --env DEADZONE_UPLOAD_PIXELDRAIN="$UPLOAD_PD" \
            --env DEADZONE_NOTIFY_TELEGRAM="$NOTIFY_TG" \
            --env ENABLE_LISTMEZO="$ENABLE_LM" \
            --env LISTMEZO_MODE="$LM_MODE" \
            --env LISTMEZO_EDITION=free \
            --env PIXELDRAIN_API_KEY="${PIXELDRAIN_API_KEY:-}" \
            --env TELEGRAM_BOT_TOKEN="$RESOLVED_BOT_TOKEN" \
            --env TELEGRAM_CHAT_ID="$RESOLVED_CHAT_ID" \
            --env TELEGRAM_GROUP_ID="$RESOLVED_GROUP_ID" \
            --env TELEGRAM_MSG_ID="$TG_MSG_ID" \
            --env GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            --env GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            --env GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            --env GITHUB_ACTOR="$GITHUB_ACTOR" \
            --rm
