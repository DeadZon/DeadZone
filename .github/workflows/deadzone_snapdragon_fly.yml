name: DeadZone Snapdragon Fly Build

on:
  workflow_dispatch:
    inputs:
      codename:
        description: "Snapdragon device codename (e.g. garnet)"
        required: true
        type: choice
        default: select_device_codename
        options:
          - select_device_codename
          - garnet

      custom_codename:
        description: "Optional custom codename (overrides selection)"
        required: false
        type: string

      edition:
        description: "ROM edition / mod"
        required: true
        type: choice
        default: base
        options:
          - base
          - gaming
          - legend
          - epic

      rom_url:
        description: "ROM download URL"
        required: true
        type: string

      mode:
        description: "dry_run = plan only | execute = real build"
        required: true
        type: choice
        default: dry_run
        options:
          - dry_run
          - execute

      upload_pixeldrain:
        description: "Upload to PixelDrain after build"
        required: true
        type: boolean
        default: true

      notify_telegram:
        description: "Send Telegram notifications"
        required: true
        type: boolean
        default: true

jobs:
  trigger-fly:
    name: "Snapdragon Fly | ${{ inputs.custom_codename || inputs.codename }} | ${{ inputs.edition }} | ${{ inputs.mode }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Guard — Fly secrets must be present
        env:
          BUILDER_URL: ${{ secrets.FLY_BUILDER_URL }}
          BUILDER_TOKEN: ${{ secrets.BUILDER_TOKEN }}
        run: |
          MISSING=""
          if [ -z "$BUILDER_URL" ]; then
            MISSING="$MISSING FLY_BUILDER_URL"
          fi
          if [ -z "$BUILDER_TOKEN" ]; then
            MISSING="$MISSING BUILDER_TOKEN"
          fi
          if [ -n "$MISSING" ]; then
            echo "[ERROR] Required secrets not set:$MISSING"
            echo "[ERROR] Add them in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "[OK] Fly secrets verified."

      - name: Resolve codename
        id: resolve
        run: |
          CUSTOM="${{ inputs.custom_codename }}"
          SELECTED="${{ inputs.codename }}"
          if [ -n "$CUSTOM" ] && [ "$CUSTOM" != "select_device_codename" ]; then
            CODENAME="$CUSTOM"
          else
            CODENAME="$SELECTED"
          fi
          if [ -z "$CODENAME" ] || [ "$CODENAME" = "select_device_codename" ]; then
            echo "[ERROR] Select a device codename or provide custom_codename"
            exit 1
          fi
          echo "codename=$CODENAME" >> "$GITHUB_OUTPUT"

      - name: POST build job to Fly Snapdragon builder
        id: post
        env:
          BUILDER_URL: ${{ secrets.FLY_BUILDER_URL }}
          BUILDER_TOKEN: ${{ secrets.BUILDER_TOKEN }}
        run: |
          CODENAME="${{ steps.resolve.outputs.codename }}"
          PAYLOAD=$(printf '{
            "source": "GitHub",
            "soc": "snapdragon",
            "codename": "%s",
            "edition": "%s",
            "mod": "%s",
            "rom_url": "%s",
            "mode": "%s",
            "upload_pixeldrain": %s,
            "notify_telegram": %s
          }' \
            "$CODENAME" \
            "${{ inputs.edition }}" \
            "${{ inputs.edition }}" \
            "${{ inputs.rom_url }}" \
            "${{ inputs.mode }}" \
            "${{ inputs.upload_pixeldrain }}" \
            "${{ inputs.notify_telegram }}")

          echo "[FLY] Posting build to $BUILDER_URL/build"
          echo "[FLY] Codename : $CODENAME"
          echo "[FLY] Edition  : ${{ inputs.edition }}"
          echo "[FLY] Mode     : ${{ inputs.mode }}"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$BUILDER_URL/build" \
            -H "Authorization: Bearer $BUILDER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "[FLY] HTTP status : $HTTP_STATUS"
          echo "[FLY] Response    : $BODY"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "[ERROR] Fly builder returned HTTP $HTTP_STATUS — build not accepted."
            exit 1
          fi

          BUILD_ID=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('build_id',''))" 2>/dev/null || echo "")
          JOB_ID=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('job_id',''))" 2>/dev/null || echo "")
          TG_MSG_ID=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('telegram_message_id',''))" 2>/dev/null || echo "")

          echo "[FLY] build_id           : $BUILD_ID"
          echo "[FLY] job_id             : $JOB_ID"
          echo "[FLY] telegram_message_id: $TG_MSG_ID"

          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "telegram_message_id=$TG_MSG_ID" >> "$GITHUB_OUTPUT"
