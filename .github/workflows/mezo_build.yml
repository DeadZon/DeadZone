name: MEZO ROM Builder

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "OTA/Fastboot ROM URL"
        required: true
        type: string

      asset_key:
        description: "MEZO_APP asset set - skipped temporarily"
        required: true
        default: "OS3_A16"
        type: choice
        options:
          - OS3_A16
          - OS3_A15
          - OS2_A15
          - OS2_A14
          - OS1_A14

      build_name:
        description: "Output build name"
        required: true
        default: "DeadZone_test"
        type: string

jobs:
  build:
    name: Build MEZO ROM
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Disk before cleanup:"
          df -h

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true

          echo "Disk after cleanup:"
          df -h

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools

          python - <<'PY'
          from pathlib import Path

          src = Path("third_party/mezo_core/requirements.txt")
          dst = Path("third_party/mezo_core/.requirements.ci.txt")

          if not src.is_file():
              src.write_text(
                  "\n".join([
                      "cryptography>=42.0.0",
                      "httpx>=0.27.0",
                      "protobuf>=4.25.0",
                      "pycryptodome>=3.19.0",
                      "requests>=2.31.0",
                      "toml>=0.10.2",
                      "zstandard>=0.22.0",
                      "brotli>=1.1.0",
                      "",
                  ]),
                  encoding="utf-8",
                  newline="\n",
              )

          lines = src.read_text(encoding="utf-8-sig", errors="ignore").splitlines()
          cleaned = []
          found_brotli = False

          for line in lines:
              raw = line.strip()
              low = raw.lower()

              if not raw or raw.startswith("#"):
                  cleaned.append(line)
                  continue

              if low == "lzma" or low.startswith("lzma"):
                  print("[requirements] skip invalid pip package:", raw)
                  continue

              if low == "google" or low.startswith("google"):
                  print("[requirements] skip google package; protobuf provides google.protobuf:", raw)
                  continue

              if low.startswith("brotli"):
                  found_brotli = True

              cleaned.append(raw)

          if not found_brotli:
              cleaned.append("brotli>=1.1.0")

          dst.write_text("\n".join(cleaned) + "\n", encoding="utf-8", newline="\n")
          print(dst.read_text(encoding="utf-8"))
          PY

          python -m pip install -r third_party/mezo_core/.requirements.ci.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            openjdk-17-jre \
            zip unzip p7zip-full \
            zstd brotli lz4 \
            file python3-tk \
            ca-certificates curl wget

      - name: Prepare MEZO tools
        working-directory: third_party/mezo_core
        run: |
          find bin -type f -exec chmod +x {} \; || true

          python -m py_compile MEZOBuildRom.py
          python -m py_compile tools_scripts/download_mezo_assets.py

          echo "MEZO core tree:"
          ls -lah

          echo "Python deps:"
          python -m pip freeze | sort

      - name: Prepare empty MEZO_APP folders
        working-directory: third_party/mezo_core
        run: |
          mkdir -p MEZO_APP
          mkdir -p MEZO_APP/product
          mkdir -p MEZO_APP/system
          mkdir -p MEZO_APP/appMod
          mkdir -p MEZO_APP/OS3_A16
          mkdir -p MEZO_APP/OS3_A15
          mkdir -p MEZO_APP/OS2_A15
          mkdir -p MEZO_APP/OS2_A14
          mkdir -p MEZO_APP/OS1_A14

          echo "MEZO_APP asset download skipped temporarily."
          echo "Requested asset key: ${{ inputs.asset_key }}"
          find MEZO_APP -maxdepth 2 -type d | sort
          du -sh MEZO_APP || true

      - name: Download ROM
        working-directory: third_party/mezo_core
        run: |
          mkdir -p _input_roms

          python - <<'PY'
          import urllib.parse
          import urllib.request
          from pathlib import Path

          url = "${{ inputs.rom_url }}"
          parsed_name = Path(urllib.parse.urlparse(url).path).name
          name = urllib.parse.unquote(parsed_name) if parsed_name else "input_rom.zip"

          if not name or name in ("/", "."):
              name = "input_rom.zip"

          out = Path("_input_roms") / name

          print(f"[ROM] Downloading: {url}", flush=True)
          print(f"[ROM] Saving to: {out}", flush=True)

          req = urllib.request.Request(
              url,
              headers={"User-Agent": "DeadZoneFactory/1.0"}
          )

          with urllib.request.urlopen(req, timeout=1800) as response:
              total = response.headers.get("Content-Length")
              total_int = int(total) if total and total.isdigit() else 0
              done = 0

              with out.open("wb") as f:
                  while True:
                      chunk = response.read(1024 * 1024)
                      if not chunk:
                          break

                      f.write(chunk)
                      done += len(chunk)

                      if total_int:
                          pct = done * 100 / total_int
                          print(
                              f"[ROM] {done / 1024 / 1024:.1f} MiB / "
                              f"{total_int / 1024 / 1024:.1f} MiB ({pct:.1f}%)",
                              flush=True,
                          )
                      else:
                          print(f"[ROM] {done / 1024 / 1024:.1f} MiB downloaded", flush=True)

          print(f"[ROM] Done: {out} size={out.stat().st_size}", flush=True)
          PY

          echo "Downloaded ROM files:"
          ls -lah _input_roms

      - name: Build ROM
        working-directory: third_party/mezo_core
        run: |
          ROM_FILE="$(find _input_roms -type f | head -n 1)"

          if [ -z "$ROM_FILE" ]; then
            echo "No ROM file found in _input_roms"
            exit 1
          fi

          echo "Using ROM: $ROM_FILE"
          python MEZOBuildRom.py "$ROM_FILE"

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p _outputs

          find third_party/mezo_core -type f -name "*.zip" \
            -not -path "*/_input_roms/*" \
            -not -path "*/_asset_downloads/*" \
            -not -path "*/MEZO_APP/*" \
            -exec cp -v {} _outputs/ \; || true

          find third_party/mezo_core -type f \( -name "*.txt" -o -name "*.log" \) \
            -not -path "*/MEZO_APP/*" \
            -not -path "*/_asset_downloads/*" \
            -exec cp -v {} _outputs/ \; || true

          echo "Collected outputs:"
          ls -lah _outputs || true

          echo "Disk after build:"
          df -h

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.build_name }}-${{ github.run_number }}
          path: _outputs/*
          if-no-files-found: warn
          retention-days: 7
