name: Deploy DeadZone Fly Builder

on:
  workflow_dispatch:
    inputs:
      target_app:
        description: "Fly app to deploy"
        required: true
        type: choice
        default: dz-builder-mtk
        options:
          - dz-builder-mtk
          - dz-builder-snap

  push:
    branches:
      - main
    paths:
      - "server/**"
      - "factory/**"
      - "docker/Dockerfile.builder"
      - "fly.toml"
      - "requirements.txt"

jobs:
  deploy:
    name: "Deploy ${{ inputs.target_app || 'dz-builder-mtk' }} to Fly.io"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: |
          set -euo pipefail
          APP="${{ inputs.target_app || 'dz-builder-mtk' }}"
          echo "[DEPLOY] Deploying app: $APP"
          flyctl deploy --app "$APP" --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
