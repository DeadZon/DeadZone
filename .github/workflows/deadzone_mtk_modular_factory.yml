name: DeadZone MTK Modular Factory

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: ROM download URL
        required: true
      device:
        description: Device codename
        required: true
        default: zircon
      platform:
        description: Platform identifier
        required: true
        default: os3_a16
      flavor:
        description: Build flavor
        required: true
        default: legend
      android_version:
        description: Android version
        required: true
        default: "16"
      mi_version:
        description: MI/OS version
        required: true
        default: OS3.0.303.0.WNOCNXM
      vbmeta_mode:
        description: vbmeta patch mode
        required: true
        default: "3"
      build_name:
        description: Build name
        required: true
        default: DeadZone_v1
      mode:
        description: Pipeline mode
        required: true
        type: choice
        options:
          - dry_run
          - execute
        default: dry_run
      notify_telegram:
        description: Send Telegram pipeline updates when secrets are configured
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deadzone-mtk-modular-factory:
    name: MTK modular factory (${{ inputs.device }} / ${{ inputs.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TEMPLATE_PATH: third_party/mezo_core/templates/deadzone_fastboot
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
      TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            unzip \
            zip \
            p7zip-full \
            openjdk-17-jre-headless \
            zstd \
            lz4 \
            python3

      - name: Compile factory
        run: python -m compileall factory

      - name: Prepare directories
        run: |
          set -euo pipefail
          mkdir -p _input_roms output/reports output/images output/final

      - name: Prepare Telegram flag
        id: telegram
        run: |
          set -euo pipefail
          telegram_flag=""
          if [ "${{ inputs.notify_telegram }}" = "true" ] && \
             [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && \
             [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            telegram_flag="--telegram"
          fi
          echo "telegram_flag=$telegram_flag" >> "$GITHUB_OUTPUT"
          if [ -n "$telegram_flag" ]; then
            echo "Telegram notifications enabled"
          else
            echo "Telegram notifications disabled"
          fi

      - name: Verify canonical fastboot template
        run: |
          set -euo pipefail
          missing=false
          for file in \
            "$TEMPLATE_PATH/bin/windows/fastboot.exe" \
            "$TEMPLATE_PATH/bin/windows/AdbWinApi.dll" \
            "$TEMPLATE_PATH/bin/windows/AdbWinUsbApi.dll"; do
            if [ ! -f "$file" ]; then
              missing=true
            fi
          done
          if [ "$missing" = "true" ]; then
            if [ "${{ inputs.notify_telegram }}" = "true" ] && \
               [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && \
               [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
              thread_id="${TELEGRAM_MESSAGE_THREAD_ID:-${TELEGRAM_THREAD_ID:-}}"
              data=(-d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=DeadZone MTK Modular Factory failed before pipeline: missing fastboot template")
              if [ -n "$thread_id" ]; then
                data+=(-d "message_thread_id=${thread_id}")
              fi
              curl --fail --silent --request POST "${data[@]}" \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" >/dev/null || true
            fi
            echo "Missing canonical fastboot template files" >&2
            exit 1
          fi
          echo "Template source: $TEMPLATE_PATH"

      - name: Download ROM
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-delay 10 --retry-all-errors \
            --output _input_roms/input_rom.zip \
            "${{ inputs.rom_url }}"

      - name: Unpack ROM for dry-run
        if: ${{ inputs.mode == 'dry_run' }}
        run: |
          set -euo pipefail
          python -m factory.unpack.pipeline \
            --rom "_input_roms/input_rom.zip" \
            --device "${{ inputs.device }}" \
            --soc "mtk" \
            --platform "${{ inputs.platform }}"

      - name: Resolve unpacked project
        if: ${{ inputs.mode == 'dry_run' }}
        id: project
        run: |
          set -euo pipefail
          project_dir="$(find output/work -type d -path '*/project' | sort | tail -n 1)"
          if [ -z "$project_dir" ] || [ ! -d "$project_dir" ]; then
            echo "Unable to resolve unpacked project directory" >&2
            exit 1
          fi
          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "Project directory: $project_dir"

      - name: Run modular pipeline dry-run
        if: ${{ inputs.mode == 'dry_run' }}
        run: |
          set -euo pipefail
          args=(
            --project "${{ steps.project.outputs.project_dir }}"
            --output-dir "output"
            --build-name "${{ inputs.build_name }}"
            --device "${{ inputs.device }}"
            --soc "mtk"
            --platform "${{ inputs.platform }}"
            --flavor "${{ inputs.flavor }}"
            --android-version "${{ inputs.android_version }}"
            --mi-version "${{ inputs.mi_version }}"
            --vbmeta-mode "${{ inputs.vbmeta_mode }}"
            --template-zip "$TEMPLATE_PATH"
          )
          if [ "${{ steps.telegram.outputs.telegram_flag }}" = "--telegram" ]; then
            args+=(--telegram)
          fi
          python -m factory.pipeline.legacy_build_orchestrator "${args[@]}"

      - name: Run modular pipeline execute
        if: ${{ inputs.mode == 'execute' }}
        run: |
          set -euo pipefail
          args=(
            --rom "_input_roms/input_rom.zip"
            --output-dir "output"
            --build-name "${{ inputs.build_name }}"
            --device "${{ inputs.device }}"
            --soc "mtk"
            --platform "${{ inputs.platform }}"
            --flavor "${{ inputs.flavor }}"
            --android-version "${{ inputs.android_version }}"
            --mi-version "${{ inputs.mi_version }}"
            --vbmeta-mode "${{ inputs.vbmeta_mode }}"
            --template-zip "$TEMPLATE_PATH"
            --execute
          )
          if [ "${{ steps.telegram.outputs.telegram_flag }}" = "--telegram" ]; then
            args+=(--telegram)
          fi
          python -m factory.pipeline.legacy_build_orchestrator "${args[@]}"

      - name: Upload reports artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-mtk-modular-reports-${{ inputs.device }}-${{ inputs.mode }}
          path: output/reports/**
          if-no-files-found: warn

      - name: Check final output artifacts
        if: ${{ always() }}
        id: final_artifacts
        run: |
          set -euo pipefail
          has_final=false
          if find output/final -type f -print -quit | grep -q .; then
            has_final=true
          elif [ -f "output/images/super.img" ]; then
            has_final=true
          fi
          echo "has_final=$has_final" >> "$GITHUB_OUTPUT"

      - name: Upload final outputs artifact
        if: ${{ always() && steps.final_artifacts.outputs.has_final == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-mtk-modular-final-${{ inputs.device }}-${{ inputs.mode }}
          path: |
            output/final/**
            output/images/super.img
          if-no-files-found: ignore
