name: DeadZone Snapdragon

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: Choose device
        required: true
        type: choice
        default: garnet
        options:
          - amethyst
          - aurora
          - babylon
          - breeze
          - chenfeng
          - cupid
          - dada
          - dagu
          - diting
          - dizi
          - flame
          - fuxi
          - garnet
          - goku
          - haotian
          - haydn
          - houji
          - ingres
          - ishtar
          - lisa
          - liuqin
          - marble
          - mayfly
          - miro
          - mondrian
          - moonstone
          - munch
          - muyu
          - myron
          - nezha
          - nuwa
          - odin
          - onyx
          - pandora
          - peridot
          - piano
          - pipa
          - popsicle
          - pudding
          - redwood
          - ruan
          - sapphire
          - sapphiren
          - sheng
          - shennong
          - sky
          - socrates
          - star
          - sunstone
          - taoyao
          - tapas
          - thor
          - topaz
          - uke
          - unicorn
          - venus
          - vermeer
          - vili
          - xuanyuan
          - xun
          - yudi
          - yupei
          - zeus
          - zijin
          - ziyi
          - zizhan
          - zorn
          - custom
      custom_codename:
        description: Custom codename when device_codename is custom
        required: false
        type: string
      rom_url:
        description: ROM URL or path
        required: true
        type: string
      style:
        description: DeadZone style
        required: true
        type: choice
        default: Stable
        options:
          - Stable
          - Legend
          - Gaming
          - EPiC
      mode:
        description: Build mode
        required: true
        type: choice
        default: build
        options:
          - build
          - production
      upload_pixeldrain:
        description: Upload to PixelDrain after build
        required: false
        type: boolean
        default: false
      notify_telegram:
        description: Send Telegram notification after build
        required: false
        type: boolean
        default: false
      keep_workspace:
        description: Keep workspace for debugging
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt || true
      - name: Build DeadZone
        env:
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SNAPDRAGON_BOT_TOKEN: ${{ secrets.TELEGRAM_SNAPDRAGON_BOT_TOKEN }}
          TELEGRAM_SNAPDRAGON_CHAT_ID: ${{ secrets.TELEGRAM_SNAPDRAGON_CHAT_ID }}
        run: |
          ROM_URL="${{ inputs.rom_url }}"
          STYLE="${{ inputs.style }}"
          MODE="${{ inputs.mode }}"
          DEVICE="${{ inputs.device_codename }}"
          CUSTOM="${{ inputs.custom_codename }}"

          ARGS=(
            --rom-url "$ROM_URL"
            --style "$STYLE"
            --soc snapdragon
            --mode "$MODE"
            --device-codename "$DEVICE"
          )

          if [ "$DEVICE" = "custom" ] && [ -n "$CUSTOM" ]; then
            ARGS+=(--custom-codename "$CUSTOM")
          fi

          if [ "${{ inputs.keep_workspace }}" = "true" ]; then
            ARGS+=(--keep-workspace)
          fi

          if [ "${{ inputs.upload_pixeldrain }}" = "true" ]; then
            ARGS+=(--upload-pixeldrain)
          fi

          if [ "${{ inputs.notify_telegram }}" = "true" ]; then
            ARGS+=(--notify-telegram)
          fi

          python3 -m factory.deadzone "${ARGS[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: deadzone-snapdragon-output
          path: output/workspace/final/*
