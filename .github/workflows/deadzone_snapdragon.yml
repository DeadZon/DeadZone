name: DeadZone Snapdragon

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: ROM URL or path
        required: true
        type: string
      style:
        description: DeadZone style
        required: true
        type: choice
        default: Stable
        options:
          - Stable
          - Legend
          - Gaming
          - EPiC
      mode:
        description: Build mode
        required: true
        type: choice
        default: build
        options:
          - build
      custom_codename:
        description: Optional fallback codename when detection fails
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ROM_URL: ${{ inputs.rom_url }}
      STYLE: ${{ inputs.style }}
      SOC: snapdragon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt || true
      - name: Build DeadZone
        run: |
          ARGS=(python3 -m factory.deadzone --rom-url "$ROM_URL" --style "$STYLE" --soc "$SOC" --mode "${{ inputs.mode }}")
          if [ -n "${{ inputs.custom_codename }}" ]; then
            ARGS+=(--custom-codename "${{ inputs.custom_codename }}")
          fi
          "${ARGS[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: deadzone-snapdragon-output
          path: output/workspace/final/*
