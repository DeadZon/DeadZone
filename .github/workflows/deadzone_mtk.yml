name: DeadZone MTK Factory

on:
  workflow_dispatch:
    inputs:
      codename:
        description: "MTK device codename (e.g. zircon)"
        required: true
        type: choice
        default: select_device_codename
        options:
          - select_device_codename
          - agate
          - aristotle
          - daumier
          - plato
          - zircon

      custom_codename:
        description: "Optional custom codename (overrides selection)"
        required: false
        type: string

      edition:
        description: "ROM edition"
        required: true
        type: choice
        default: base
        options:
          - base
          - gaming
          - legend
          - epic

      rom_url:
        description: "ROM download URL"
        required: true
        type: string

      mode:
        description: "dry_run = plan only | execute = real build"
        required: true
        type: choice
        default: dry_run
        options:
          - dry_run
          - execute

      upload_pixeldrain:
        description: "Upload to PixelDrain after build"
        required: true
        type: boolean
        default: true

      notify_telegram:
        description: "Send Telegram notifications"
        required: true
        type: boolean
        default: true

jobs:
  trigger-fly-build:
    name: "MTK | ${{ inputs.custom_codename || inputs.codename }} | ${{ inputs.edition }} | ${{ inputs.mode }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve codename
        id: resolve
        run: |
          CUSTOM="${{ inputs.custom_codename }}"
          SELECTED="${{ inputs.codename }}"
          if [ -n "$CUSTOM" ] && [ "$CUSTOM" != "select_device_codename" ]; then
            CODENAME="$CUSTOM"
          else
            CODENAME="$SELECTED"
          fi
          if [ -z "$CODENAME" ] || [ "$CODENAME" = "select_device_codename" ]; then
            echo "[ERROR] Select a device codename or provide custom_codename"
            exit 1
          fi
          echo "codename=$CODENAME" >> "$GITHUB_OUTPUT"

      - name: Send build job to Fly builder
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "codename": "${{ steps.resolve.outputs.codename }}",
            "edition": "${{ inputs.edition }}",
            "rom_url": "${{ inputs.rom_url }}",
            "mode": "${{ inputs.mode }}",
            "upload_pixeldrain": ${{ inputs.upload_pixeldrain }},
            "notify_telegram": ${{ inputs.notify_telegram }}
          }
          EOF
          )
          echo "[FACTORY] Sending job to Fly builder..."
          echo "[FACTORY] Codename : ${{ steps.resolve.outputs.codename }}"
          echo "[FACTORY] Edition  : ${{ inputs.edition }}"
          echo "[FACTORY] Mode     : ${{ inputs.mode }}"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${{ secrets.FLY_BUILDER_URL }}/build" \
            -H "Authorization: Bearer ${{ secrets.BUILDER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "[FACTORY] Response: $BODY"
          if [ "$HTTP_STATUS" != "202" ]; then
            echo "[ERROR] Fly builder returned HTTP $HTTP_STATUS"
            exit 1
          fi
          JOB_ID=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('job_id',''))")
          echo "[FACTORY] Job queued: $JOB_ID"
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
