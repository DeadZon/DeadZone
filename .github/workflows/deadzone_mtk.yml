name: DeadZone MTK

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: Choose device
        required: true
        type: choice
        default: zircon
        options:
          - agate
          - aristotle
          - daumier
          - plato
          - zircon
          - custom
      custom_codename:
        description: Custom codename when device_codename is custom
        required: false
        type: string
      rom_url:
        description: ROM URL or path
        required: true
        type: string
      style:
        description: DeadZone style
        required: true
        type: choice
        default: Stable
        options:
          - Stable
          - Legend
          - Gaming
          - EPiC
      mode:
        description: Build mode
        required: true
        type: choice
        default: build
        options:
          - build
          - production
      upload_pixeldrain:
        description: Upload to PixelDrain after build
        required: false
        type: boolean
        default: false
      notify_telegram:
        description: Send Telegram notification after build
        required: false
        type: boolean
        default: false
      keep_workspace:
        description: Keep workspace for debugging
        required: false
        type: boolean
        default: false
      allow_oversized_final:
        description: Allow final ZIP over 4.5GB
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt || true
      - name: Prepare Android toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xz-utils brotli zstd file e2fsprogs erofs-utils p7zip-full \
            android-sdk-libsparse-utils fuse3 || \
          sudo apt-get install -y --no-install-recommends \
            xz-utils brotli zstd file e2fsprogs erofs-utils p7zip-full fuse3

          python3 - <<'PY'
          import json
          import platform
          import urllib.request

          arch = platform.machine().lower()
          aliases = {
              "x86_64": ("amd64", "x86_64"),
              "amd64": ("amd64", "x86_64"),
              "aarch64": ("arm64", "aarch64"),
              "arm64": ("arm64", "aarch64"),
          }.get(arch, (arch,))
          with urllib.request.urlopen("https://api.github.com/repos/ssut/payload-dumper-go/releases/latest") as response:
              data = json.load(response)
          matches = [
              asset for asset in data.get("assets", [])
              if "linux" in asset.get("name", "").lower()
              and any(alias in asset.get("name", "").lower() for alias in aliases)
              and asset.get("name", "").lower().endswith((".tar.gz", ".tgz"))
          ]
          if not matches:
              raise SystemExit("payload-dumper-go linux release asset not found")
          urllib.request.urlretrieve(matches[0]["browser_download_url"], "/tmp/payload-dumper-go.tar.gz")
          PY
          mkdir -p /tmp/payload-dumper-go tools/helper
          tar -xzf /tmp/payload-dumper-go.tar.gz -C /tmp/payload-dumper-go
          install -m 0755 "$(find /tmp/payload-dumper-go -type f -name payload-dumper-go | head -n 1)" tools/helper/payload-dumper-go
          tools/helper/payload-dumper-go -h >/dev/null || true
          chmod +x tools/helper/linux/* 2>/dev/null || true
          echo "$PWD/tools/helper/linux" >> "$GITHUB_PATH"
          echo "$PWD/tools/helper" >> "$GITHUB_PATH"
          export PATH="$PWD/tools/helper/linux:$PWD/tools/helper:$PATH"

          # ── EROFS capability detection ──────────────────────────────────────
          echo ""
          echo "[EROFS] Checking erofs-utils installation:"
          FSCK_EROFS="$(command -v fsck.erofs 2>/dev/null || true)"
          DUMP_EROFS="$(command -v dump.erofs 2>/dev/null || true)"
          EROFS_EXTRACT_OK=false

          if [ -n "$FSCK_EROFS" ]; then
            echo "[EROFS] Tool: fsck.erofs = $FSCK_EROFS"
            fsck.erofs --version 2>/dev/null | head -1 || true
            FSCK_HELP="$(fsck.erofs --help 2>&1 || true)"
            if echo "$FSCK_HELP" | grep -q -- "--extract"; then
              echo "[EROFS] Capability: fsck.erofs --extract SUPPORTED"
              EROFS_EXTRACT_OK=true
            else
              echo "[EROFS] Capability: fsck.erofs --extract NOT supported in apt version"
            fi
          else
            echo "[EROFS] fsck.erofs: NOT FOUND"
          fi

          if [ -n "$DUMP_EROFS" ]; then
            echo "[EROFS] Tool: dump.erofs = $DUMP_EROFS"
            dump.erofs --version 2>/dev/null | head -1 || true
          fi

          # Build erofs-utils from source if apt version lacks extraction support
          if [ "$EROFS_EXTRACT_OK" != "true" ]; then
            echo "[EROFS] apt version does not support extraction — building erofs-utils from source..."
            sudo apt-get install -y --no-install-recommends \
              build-essential autoconf automake libtool pkg-config \
              liblz4-dev liblzma-dev libzstd-dev zlib1g-dev libfuse3-dev 2>/dev/null || \
            sudo apt-get install -y --no-install-recommends \
              build-essential autoconf automake libtool pkg-config \
              liblz4-dev liblzma-dev libzstd-dev zlib1g-dev libfuse-dev 2>/dev/null || true

            EROFS_TAG="v1.8.1"
            EROFS_SRC_URL="https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git/snapshot/erofs-utils-${EROFS_TAG}.tar.gz"
            curl -fsSL --retry 3 -o /tmp/erofs-utils.tar.gz "$EROFS_SRC_URL" 2>/dev/null && \
            mkdir -p /tmp/erofs-build && \
            tar -xzf /tmp/erofs-utils.tar.gz -C /tmp/erofs-build --strip-components=1 && \
            (cd /tmp/erofs-build && \
              ./autogen.sh && \
              ./configure --prefix=/usr/local 2>/dev/null && \
              make -j"$(nproc)" 2>/dev/null && \
              sudo make install 2>/dev/null) && \
            echo "[EROFS] Source build complete." || \
            echo "[EROFS] Source build failed — will use listing-only fallback for EROFS partitions."

            FSCK_NEW="$(command -v fsck.erofs 2>/dev/null || true)"
            if [ -n "$FSCK_NEW" ]; then
              echo "[EROFS] fsck.erofs after build: $FSCK_NEW"
              fsck.erofs --version 2>/dev/null | head -1 || true
              if fsck.erofs --help 2>&1 | grep -q -- "--extract"; then
                echo "[EROFS] Capability: fsck.erofs --extract SUPPORTED (after source build)"
              else
                echo "[EROFS] Capability: fsck.erofs --extract still NOT supported"
              fi
            fi
          fi
          echo ""

          # ── Toolchain summary ───────────────────────────────────────────────
          which lpmake    || true
          which lpdump    || true
          which lpunpack  || true
          which simg2img  || true
          which img2simg  || true
          which debugfs   || true
          which dump.erofs  || true
          which fsck.erofs  || true
          which erofsfuse   || true
          which 7z        || true
          python3 -m factory.deadzone --check-toolchain
          if [ ! -x tools/helper/linux/lpmake ] && ! command -v lpmake >/dev/null 2>&1; then
            echo "lpmake is missing. Install Android dynamic partition tools or place lpmake in tools/helper/linux."
            exit 1
          fi
      - name: Build DeadZone
        env:
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MTK_BOT_TOKEN: ${{ secrets.TELEGRAM_MTK_BOT_TOKEN }}
          TELEGRAM_MTK_CHAT_ID: ${{ secrets.TELEGRAM_MTK_CHAT_ID }}
          TELEGRAM_SNAPDRAGON_BOT_TOKEN: ${{ secrets.TELEGRAM_SNAPDRAGON_BOT_TOKEN }}
          TELEGRAM_SNAPDRAGON_CHAT_ID: ${{ secrets.TELEGRAM_SNAPDRAGON_CHAT_ID }}
        run: |
          ROM_URL="${{ inputs.rom_url }}"
          STYLE="${{ inputs.style }}"
          MODE="${{ inputs.mode }}"
          DEVICE="${{ inputs.device_codename }}"
          CUSTOM="${{ inputs.custom_codename }}"

          ARGS=(
            --rom-url "$ROM_URL"
            --style "$STYLE"
            --soc mtk
            --mode "$MODE"
            --device-codename "$DEVICE"
          )

          if [ "$DEVICE" = "custom" ] && [ -n "$CUSTOM" ]; then
            ARGS+=(--custom-codename "$CUSTOM")
          fi

          if [ "${{ inputs.keep_workspace }}" = "true" ]; then
            ARGS+=(--keep-workspace)
          fi

          if [ "${{ inputs.upload_pixeldrain }}" = "true" ]; then
            ARGS+=(--upload-pixeldrain)
          fi

          if [ "${{ inputs.notify_telegram }}" = "true" ]; then
            ARGS+=(--notify-telegram)
          fi

          if [ "${{ inputs.allow_oversized_final }}" = "true" ]; then
            ARGS+=(--allow-oversized-final)
          fi

          python3 -m factory.deadzone "${ARGS[@]}"

      - name: Write job summary
        if: always()
        run: |
          if [ -f output/workspace/reports/github_summary.md ]; then
            cat output/workspace/reports/github_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## DeadZone Build Summary"
              echo
              echo "- status: reports were not generated"
              echo "- failed stage: startup"
              echo
              echo "Check workflow logs and any uploaded artifacts."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-reports
          path: output/workspace/reports/**
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-logs
          path: output/workspace/logs/**
          if-no-files-found: ignore

      - name: Upload sidecars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-sidecars
          path: |
            output/workspace/reports/upload_links.txt
            output/workspace/reports/upload_report.txt
            output/workspace/reports/telegram_report.txt
            output/workspace/reports/final_zip_report.txt
            output/workspace/reports/size_policy_report.txt
            output/workspace/reports/super_build_report.txt
            output/workspace/reports/toolchain_report.txt
            output/workspace/reports/payload_unpack_report.txt
            output/workspace/reports/device_registry_report.txt
            output/workspace/reports/super_profile_report.txt
            output/workspace/reports/error_summary.txt
          if-no-files-found: ignore

      - name: Upload final info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-final-info
          path: |
            output/final/*.sha256
            output/final/build_info.txt
            output/final/upload_links.txt
            output/final/*.txt
          if-no-files-found: ignore

      - name: Upload app inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadzone-app-inventory
          path: |
            output/final/*AppInventory*.zip
            output/workspace/inventory/**
            output/workspace/reports/app_inventory_report.txt
            output/workspace/reports/image_extraction_report.txt
            output/workspace/meta/app_inventory.json
            output/workspace/meta/image_extraction.json
          if-no-files-found: ignore
