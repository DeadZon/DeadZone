name: DeadZone MTK

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: ROM URL or path
        required: true
        type: string
      style:
        description: DeadZone style
        required: true
        type: choice
        default: Stable
        options:
          - Stable
          - Legend
          - Gaming
          - EPiC
      mode:
        description: Build mode
        required: true
        type: choice
        default: build
        options:
          - build
          - production
      upload_pixeldrain:
        description: Reserve PixelDrain upload wiring
        required: false
        type: boolean
        default: false
      notify_telegram:
        description: Reserve Telegram notification wiring
        required: false
        type: boolean
        default: false
      custom_codename:
        description: Optional fallback codename when detection fails
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ROM_URL: ${{ inputs.rom_url }}
      STYLE: ${{ inputs.style }}
      MODE: ${{ inputs.mode }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt || true
      - name: Build DeadZone
        run: |
          CUSTOM_CODENAME_FLAG=()
          if [ -n "${{ inputs.custom_codename }}" ]; then
            CUSTOM_CODENAME_FLAG=(--custom-codename "${{ inputs.custom_codename }}")
          fi
          python3 -m factory.deadzone \
            --rom-url "$ROM_URL" \
            --style "$STYLE" \
            --soc mtk \
            --mode "$MODE" \
            "${CUSTOM_CODENAME_FLAG[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: deadzone-mtk-output
          path: output/workspace/final/*
