name: DeadZone MTK Factory

on:
  workflow_dispatch:
    inputs:
      device:
        description: "MTK device"
        required: true
        type: choice
        options:
          - "agate | Xiaomi 11T"
          - "aristotle | Xiaomi 13T"
          - "daumier | Xiaomi 12 Pro Dimensity Edition"
          - "plato | Xiaomi 12T"
          - "zircon | Redmi Note 13 Pro+ 5G"

      platform:
        description: "ROM platform"
        required: true
        type: choice
        options:
          - os3_a16
          - os3_a15
          - os2_a15
          - os2_a14
          - os1_a14
          - os1_a13
          - miui_a13

      flavor:
        description: "DeadZone flavor"
        required: true
        type: choice
        options:
          - deadzone
          - deadzone_gaming
          - deadzone_epic
          - deadzone_legend

      rom_url:
        description: "ROM download URL (required when execute_build is true)"
        required: false
        type: string
        default: ""

      execute_build:
        description: "Run MEZOBuildRom.py — false = plan only (safe), true = real build"
        required: false
        type: boolean
        default: false

      upload_target:
        description: "Where to upload final ROM ZIP"
        required: true
        type: choice
        default: pixeldrain
        options:
          - pixeldrain
          - none

      upload_debug_artifacts:
        description: "Upload debug logs/artifacts to GitHub Actions (disabled by default)"
        required: false
        type: boolean
        default: false

env:
  TELEGRAM_MTK_BOT_TOKEN: ${{ secrets.TELEGRAM_MTK_BOT_TOKEN }}
  TELEGRAM_MTK_CHAT_ID: ${{ secrets.TELEGRAM_MTK_CHAT_ID }}
  PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}

jobs:
  mtk-build:
    name: "MTK | ${{ inputs.device }} | ${{ inputs.platform }} | ${{ inputs.flavor }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install factory requirements
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements.txt

      # ── Always: validate registry ────────────────────────────────────────────

      - name: Validate registry
        run: python -m factory.cli validate-registry

      # ── Parse codename from "codename | Marketing Name" format ───────────────

      - name: Parse device codename
        id: parse_device
        run: |
          RAW_DEVICE="${{ inputs.device }}"
          DEVICE="${RAW_DEVICE%% | *}"
          echo "DEVICE=$DEVICE" >> "$GITHUB_ENV"
          echo "codename=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "[INFO] Parsed codename: $DEVICE"

      # ── Notify build started (execute_build only) ────────────────────────────

      - name: Notify build started
        if: inputs.execute_build == true
        continue-on-error: true
        run: |
          python - <<'PY'
          from factory.reports.build_summary import format_build_start
          from factory.services.telegram_notify import send_mtk_message
          run_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          msg = format_build_start(
              device="${{ steps.parse_device.outputs.codename }}",
              soc="mtk",
              platform="${{ inputs.platform }}",
              flavor="${{ inputs.flavor }}",
              run_url=run_url,
          )
          send_mtk_message(msg)
          PY

      # ── Always: print build plan ─────────────────────────────────────────────

      - name: Show build plan
        run: |
          python -m factory.cli plan \
            --device   "$DEVICE" \
            --soc      mtk \
            --platform "${{ inputs.platform }}" \
            --flavor   "${{ inputs.flavor }}"

      # ── Dry-run complete (execute_build = false) ─────────────────────────────

      - name: Dry-run complete
        if: inputs.execute_build != true
        run: |
          echo "=========================================="
          echo "  execute_build = false"
          echo "  Plan validated. No ROM build triggered."
          echo "  Set execute_build=true + rom_url to build."
          echo "=========================================="

      # ── Real build path (execute_build = true) ───────────────────────────────

      - name: Require rom_url for real build
        if: inputs.execute_build == true
        run: |
          if [ -z "${{ inputs.rom_url }}" ]; then
            echo "[ERROR] execute_build is true but rom_url is empty."
            echo "        Provide a ROM download URL to run a real build."
            exit 1
          fi

      - name: Free disk space
        if: inputs.execute_build == true
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet           || true
          sudo rm -rf /usr/local/lib/android       || true
          sudo rm -rf /opt/ghc                     || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL  || true
          docker system prune -af                  || true
          echo "Disk after cleanup:"
          df -h

      - name: Install system dependencies
        if: inputs.execute_build == true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            openjdk-17-jre \
            zip unzip p7zip-full \
            zstd brotli lz4 \
            file \
            ca-certificates curl wget \
            erofs-utils

      - name: Install MEZO requirements
        if: inputs.execute_build == true
        run: |
          python - <<'PY'
          from pathlib import Path

          src = Path("third_party/mezo_core/requirements.txt")
          dst = Path("third_party/mezo_core/.requirements.ci.txt")

          if not src.is_file():
              src.write_text(
                  "\n".join([
                      "cryptography>=42.0.0",
                      "httpx>=0.27.0",
                      "protobuf>=4.25.0",
                      "pycryptodome>=3.19.0",
                      "requests>=2.31.0",
                      "toml>=0.10.2",
                      "zstandard>=0.22.0",
                      "brotli>=1.1.0",
                      "",
                  ]),
                  encoding="utf-8",
                  newline="\n",
              )

          lines = src.read_text(encoding="utf-8-sig", errors="ignore").splitlines()
          cleaned = []
          found_brotli = False
          for line in lines:
              raw = line.strip()
              low = raw.lower()
              if not raw or raw.startswith("#"):
                  cleaned.append(line)
                  continue
              if low == "lzma" or low.startswith("lzma"):
                  print("[requirements] skip:", raw)
                  continue
              if low == "google" or low.startswith("google"):
                  print("[requirements] skip:", raw)
                  continue
              if low.startswith("brotli"):
                  found_brotli = True
              cleaned.append(raw)
          if not found_brotli:
              cleaned.append("brotli>=1.1.0")
          dst.write_text("\n".join(cleaned) + "\n", encoding="utf-8", newline="\n")
          print(dst.read_text(encoding="utf-8"))
          PY
          python -m pip install -r third_party/mezo_core/.requirements.ci.txt

      - name: Prepare MEZO tools
        if: inputs.execute_build == true
        working-directory: third_party/mezo_core
        run: |
          find bin -type f -exec chmod +x {} \; || true
          python -m py_compile MEZOBuildRom.py
          echo "MEZO core ready."

      - name: Prepare MEZO_APP folders
        if: inputs.execute_build == true
        working-directory: third_party/mezo_core
        run: |
          mkdir -p MEZO_APP/product MEZO_APP/system MEZO_APP/appMod
          mkdir -p MEZO_APP/OS3_A16 MEZO_APP/OS3_A15 MEZO_APP/OS2_A15
          mkdir -p MEZO_APP/OS2_A14 MEZO_APP/OS1_A14

      - name: Download ROM
        if: inputs.execute_build == true
        run: |
          mkdir -p _input_roms
          python - <<'PY'
          import urllib.parse
          import urllib.request
          from pathlib import Path

          url = "${{ inputs.rom_url }}"
          parsed_name = Path(urllib.parse.urlparse(url).path).name
          name = urllib.parse.unquote(parsed_name) if parsed_name else "input_rom.zip"
          if not name or name in ("/", "."):
              name = "input_rom.zip"

          out = Path("_input_roms") / name
          print(f"[ROM] Downloading: {url}", flush=True)
          print(f"[ROM] Saving to  : {out}", flush=True)

          req = urllib.request.Request(url, headers={"User-Agent": "DeadZoneFactory/1.0"})
          with urllib.request.urlopen(req, timeout=1800) as resp:
              total = resp.headers.get("Content-Length")
              total_int = int(total) if total and total.isdigit() else 0
              done = 0
              with out.open("wb") as f:
                  while True:
                      chunk = resp.read(1024 * 1024)
                      if not chunk:
                          break
                      f.write(chunk)
                      done += len(chunk)
                      if total_int:
                          pct = done * 100 / total_int
                          print(
                              f"[ROM] {done/1024/1024:.1f} MiB / "
                              f"{total_int/1024/1024:.1f} MiB ({pct:.1f}%)",
                              flush=True,
                          )
                      else:
                          print(f"[ROM] {done/1024/1024:.1f} MiB downloaded", flush=True)
          print(f"[ROM] Done: {out} ({out.stat().st_size} bytes)", flush=True)
          PY
          echo "ROM files:"
          ls -lah _input_roms

      # ── Device / ROM mismatch guard ──────────────────────────────────────────

      - name: Device/ROM mismatch guard
        if: inputs.execute_build == true
        run: |
          python - <<'PY'
          import sys
          import yaml
          from pathlib import Path

          device = "${{ steps.parse_device.outputs.codename }}".lower().strip()

          rom_files = [f for f in Path("_input_roms").iterdir() if f.is_file()]
          if not rom_files:
              print("[DEVICE GUARD] No ROM file found — guard skipped.")
              sys.exit(0)

          rom_filename = rom_files[0].name.lower()
          print(f"[DEVICE GUARD] Selected device : {device}")
          print(f"[DEVICE GUARD] ROM filename    : {rom_filename}")

          from factory.core.paths import REGISTRY_ROOT
          group_yml = REGISTRY_ROOT / "device_groups" / "mtk.yml"
          known = set()
          if group_yml.exists():
              with group_yml.open() as fh:
                  data = yaml.safe_load(fh)
              for entry in data.get("devices", []):
                  c = entry.get("codename", "")
                  if c:
                      known.add(c.lower())

          detected = None
          for codename in known:
              if (
                  rom_filename.startswith(f"{codename}-")
                  or rom_filename.startswith(f"{codename}_")
                  or f"_{codename}-" in rom_filename
                  or f"_{codename}_" in rom_filename
                  or f"-{codename}-" in rom_filename
              ):
                  detected = codename
                  break

          if detected is None:
              print("[DEVICE GUARD] Could not detect codename from ROM filename — warning only, continuing.")
              sys.exit(0)

          print(f"[DEVICE GUARD] Detected ROM device: {detected}")

          if detected != device:
              print(f"[DEVICE GUARD] Selected device: {device}")
              print(f"[DEVICE GUARD] ROM filename device: {detected}")
              print("[DEVICE GUARD] Refusing to build mismatched ROM.")
              try:
                  from factory.reports.build_summary import format_device_mismatch
                  from factory.services.telegram_notify import send_mtk_message
                  run_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  send_mtk_message(format_device_mismatch(device, detected, "mtk", run_url))
              except Exception as exc:
                  print(f"[DEVICE GUARD] Warning: Telegram notification failed: {exc}")
              sys.exit(1)

          print(f"[DEVICE GUARD] Device match confirmed: {device}")
          PY

      - name: Run MEZO via factory CLI
        if: inputs.execute_build == true
        run: |
          ROM_FILE="$(find _input_roms -type f | head -n 1)"
          if [ -z "$ROM_FILE" ]; then
            echo "[ERROR] No ROM file found in _input_roms"
            exit 1
          fi
          echo "[INFO] ROM: $ROM_FILE"
          python -m factory.cli run-mezo \
            --rom      "$ROM_FILE" \
            --device   "$DEVICE" \
            --soc      mtk \
            --platform "${{ inputs.platform }}" \
            --flavor   "${{ inputs.flavor }}" \
            --execute

      - name: Collect outputs
        if: always() && inputs.execute_build == true
        run: |
          mkdir -p _factory_outputs
          find third_party/mezo_core -type f -name "*.zip" \
            -not -path "*/_input_roms/*" \
            -not -path "*/_asset_downloads/*" \
            -not -path "*/MEZO_APP/*" \
            -exec cp -v {} _factory_outputs/ \; || true
          find third_party/mezo_core -type f \( -name "*.txt" -o -name "*.log" \) \
            -not -path "*/MEZO_APP/*" \
            -not -path "*/_asset_downloads/*" \
            -exec cp -v {} _factory_outputs/ \; || true
          echo "Collected outputs:"
          ls -lah _factory_outputs || true
          df -h

      - name: Upload artifacts
        if: always() && inputs.execute_build == true && inputs.upload_debug_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: "DeadZone-mtk-${{ steps.parse_device.outputs.codename }}-${{ inputs.platform }}-${{ inputs.flavor }}-${{ github.run_number }}"
          path: _factory_outputs/*
          if-no-files-found: warn
          retention-days: 7

      - name: Upload EROFS diagnostic logs
        if: always() && inputs.execute_build == true && inputs.upload_debug_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: "erofs-logs-mtk-${{ steps.parse_device.outputs.codename }}-${{ github.run_number }}"
          path: |
            third_party/mezo_core/**/logs/mkfs_erofs/**
            third_party/mezo_core/**/*_fs_config
            third_party/mezo_core/**/*_file_contexts
          if-no-files-found: ignore
          retention-days: 14

      # ── Notify build failure ─────────────────────────────────────────────────

      - name: Notify build failed
        if: failure() && inputs.execute_build == true
        continue-on-error: true
        run: |
          python - <<'PY'
          from factory.reports.build_summary import format_build_failure
          from factory.services.telegram_notify import send_mtk_message
          run_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          msg = format_build_failure(
              device="${{ steps.parse_device.outputs.codename }}",
              soc="mtk",
              platform="${{ inputs.platform }}",
              flavor="${{ inputs.flavor }}",
              run_url=run_url,
          )
          send_mtk_message(msg)
          PY

      # ── Validate final ROM ZIP before upload ─────────────────────────────────

      - name: Validate final ROM ZIP (branding + manifest)
        id: validate_zip
        if: success() && inputs.execute_build == true
        env:
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        run: |
          import os, sys
          from pathlib import Path

          EXCLUDE_DIRS = {"_input_roms", "_asset_downloads", "_factory_outputs", "MEZO_APP"}
          EXCLUDE_SUFFIXES = ("_logs.zip", "_diagnostic.zip")

          search_roots = [Path("output"), Path("output/final")]
          search_roots += sorted(Path("third_party/mezo_core").glob("DeadZone*"))
          search_roots += [Path("third_party/mezo_core")]

          seen = set()
          candidates = []
          for root in search_roots:
              if not root.exists():
                  continue
              for f in root.rglob("*.zip"):
                  if f in seen:
                      continue
                  seen.add(f)
                  if EXCLUDE_DIRS & set(f.parts):
                      continue
                  if any(f.name.endswith(s) for s in EXCLUDE_SUFFIXES):
                      continue
                  if "DeadZone" in f.name or "output" in str(f):
                      candidates.append(f)

          if not candidates:
              print("[VALIDATE] No final ROM ZIP found — skipping validation.")
              gho = os.environ.get("GITHUB_OUTPUT", "")
              if gho:
                  with open(gho, "a") as out:
                      out.write("final_zip=\n")
              sys.exit(0)

          candidates.sort(key=lambda p: (p.stat().st_mtime, p.stat().st_size), reverse=True)
          final_zip = candidates[0]
          print(f"[VALIDATE] Validating: {final_zip}")

          gho = os.environ.get("GITHUB_OUTPUT", "")
          if gho:
              with open(gho, "a") as out:
                  out.write(f"final_zip={final_zip}\n")

          import subprocess
          r1 = subprocess.run(
              [sys.executable, "-m", "factory.cli", "inspect-zip", "--zip", str(final_zip)],
              check=False,
          )

          r2 = subprocess.run(
              [sys.executable, "-m", "factory.cli", "validate-final-zip", "--zip", str(final_zip)],
              check=False,
          )

          if r2.returncode != 0:
              print("[VALIDATE] Branding validation FAILED — PixelDrain upload will be skipped.", file=sys.stderr)
              sys.exit(1)

          print("[VALIDATE] ZIP validation passed.")
        shell: python

      # ── Find final ROM ZIP and upload to PixelDrain ──────────────────────────

      - name: Find and upload final ROM to PixelDrain
        id: pixeldrain
        if: success() && inputs.execute_build == true && inputs.upload_target == 'pixeldrain'
        continue-on-error: true
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          EXCLUDE_DIRS = {"_input_roms", "_asset_downloads", "_factory_outputs", "MEZO_APP"}
          EXCLUDE_SUFFIXES = ("_logs.zip", "_diagnostic.zip")

          search_roots = [Path("output"), Path("output/final")]
          search_roots += sorted(Path("third_party/mezo_core").glob("DeadZone*"))
          search_roots += [Path("third_party/mezo_core")]

          seen = set()
          candidates = []
          for root in search_roots:
              if not root.exists():
                  continue
              for f in root.rglob("*.zip"):
                  if f in seen:
                      continue
                  seen.add(f)
                  if EXCLUDE_DIRS & set(f.parts):
                      continue
                  if any(f.name.endswith(s) for s in EXCLUDE_SUFFIXES):
                      continue
                  if "DeadZone" in f.name or "output" in str(f):
                      candidates.append(f)

          gho = os.environ.get("GITHUB_OUTPUT", "")
          if not candidates:
              print("[PIXELDRAIN] No final ROM ZIP found — skipping upload.")
              if gho:
                  with open(gho, "a") as out:
                      out.write("pd_link=\npd_found=false\n")
          else:
              candidates.sort(key=lambda p: (p.stat().st_mtime, p.stat().st_size), reverse=True)
              print(f"[PIXELDRAIN] Candidates: {[str(c) for c in candidates]}")
              final_zip = candidates[0]
              print(f"[PIXELDRAIN] Selected: {final_zip}")

              from factory.services.pixeldrain_upload import upload_to_pixeldrain, write_sidecar
              result = upload_to_pixeldrain(str(final_zip))
              write_sidecar(result)

              link = result.get("link", "")
              if gho:
                  with open(gho, "a") as out:
                      out.write(f"pd_link={link}\npd_found=true\n")
          PY

      - name: Notify upload success
        if: success() && inputs.execute_build == true && inputs.upload_target == 'pixeldrain' && steps.pixeldrain.outputs.pd_found == 'true' && steps.pixeldrain.outputs.pd_link != ''
        continue-on-error: true
        run: |
          python - <<'PY'
          from factory.reports.build_summary import format_upload_success
          from factory.services.telegram_notify import send_mtk_message
          run_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          link = "${{ steps.pixeldrain.outputs.pd_link }}"
          msg = format_upload_success(
              device="${{ steps.parse_device.outputs.codename }}",
              soc="mtk",
              platform="${{ inputs.platform }}",
              flavor="${{ inputs.flavor }}",
              pixeldrain_link=link,
              run_url=run_url,
          )
          send_mtk_message(msg)
          PY

      # ── Notify build succeeded with no upload ────────────────────────────────

      - name: Notify build succeeded (upload skipped)
        if: success() && inputs.execute_build == true && inputs.upload_target == 'none'
        continue-on-error: true
        run: |
          python - <<'PY'
          from factory.reports.build_summary import format_build_success_no_upload
          from factory.services.telegram_notify import send_mtk_message
          run_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          msg = format_build_success_no_upload(
              device="${{ steps.parse_device.outputs.codename }}",
              soc="mtk",
              platform="${{ inputs.platform }}",
              flavor="${{ inputs.flavor }}",
              run_url=run_url,
          )
          send_mtk_message(msg)
          PY
