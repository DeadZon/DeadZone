name: DeadZone MTK GitHub Build

on:
  workflow_dispatch:
    inputs:
      codename:
        description: "MTK device codename (e.g. zircon)"
        required: true
        type: choice
        default: select_device_codename
        options:
          - select_device_codename
          - agate
          - aristotle
          - daumier
          - plato
          - zircon

      custom_codename:
        description: "Optional custom codename (overrides selection)"
        required: false
        type: string

      edition:
        description: "ROM edition / mod"
        required: true
        type: choice
        default: base
        options:
          - base
          - gaming
          - legend
          - epic

      rom_url:
        description: "ROM download URL"
        required: true
        type: string

      mode:
        description: "dry_run = plan only | execute = real build"
        required: true
        type: choice
        default: dry_run
        options:
          - dry_run
          - execute

      upload_pixeldrain:
        description: "Upload to PixelDrain after build"
        required: true
        type: boolean
        default: true

      notify_telegram:
        description: "Send Telegram notifications"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: "MTK | ${{ inputs.custom_codename || inputs.codename }} | ${{ inputs.edition }} | ${{ inputs.mode }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Guard — no Fly secrets required
        run: |
          if [ -n "$FLY_BUILDER_URL" ] || [ -n "$BUILDER_TOKEN" ]; then
            echo "[ERROR] This workflow must NOT use Fly builder secrets."
            echo "[ERROR] Remove FLY_BUILDER_URL and BUILDER_TOKEN from this job."
            exit 1
          fi
          echo "[OK] No Fly secrets injected — GitHub local build confirmed."

      - name: Resolve codename
        id: resolve
        run: |
          CUSTOM="${{ inputs.custom_codename }}"
          SELECTED="${{ inputs.codename }}"
          if [ -n "$CUSTOM" ] && [ "$CUSTOM" != "select_device_codename" ]; then
            CODENAME="$CUSTOM"
          else
            CODENAME="$SELECTED"
          fi
          if [ -z "$CODENAME" ] || [ "$CODENAME" = "select_device_codename" ]; then
            echo "[ERROR] Select a device codename or provide custom_codename"
            exit 1
          fi
          echo "codename=$CODENAME" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet requests pyyaml

      - name: Run factory pipeline (MTK local)
        env:
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_MTK_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_MTK_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: |
          EXTRA_FLAGS=""
          if [ "${{ inputs.upload_pixeldrain }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --upload-pixeldrain"
          fi
          if [ "${{ inputs.notify_telegram }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --notify-telegram"
          fi
          python -m factory.pipeline.orchestrator \
            --codename "${{ steps.resolve.outputs.codename }}" \
            --edition "${{ inputs.edition }}" \
            --rom-url "${{ inputs.rom_url }}" \
            --mode "${{ inputs.mode }}" \
            --soc mtk \
            $EXTRA_FLAGS

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report-mtk-${{ steps.resolve.outputs.codename }}-${{ github.run_number }}
          path: |
            output/reports/
            output/logs/
          if-no-files-found: ignore
