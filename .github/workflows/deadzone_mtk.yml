name: DeadZone MTK

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: Device codename
        required: true
        type: choice
        default: zircon
        options:
          - agate
          - aristotle
          - daumier
          - plato
          - zircon
          - custom
      custom_codename:
        description: Custom codename when device_codename is custom
        required: false
        type: string
      rom_url:
        description: ROM URL or path
        required: true
        type: string
      style:
        description: DeadZone style
        required: true
        type: choice
        default: Stable
        options:
          - Stable
          - Legend
          - Gaming
          - EPiC
      mode:
        description: Build mode
        required: true
        type: choice
        default: build
        options:
          - build
          - production
      upload_pixeldrain:
        description: Upload to PixelDrain after build
        required: false
        type: boolean
        default: false
      notify_telegram:
        description: Send Telegram notification after build
        required: false
        type: boolean
        default: false
      keep_workspace:
        description: Keep workspace for debugging
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt || true
      - name: Build DeadZone
        run: |
          ROM_URL="${{ inputs.rom_url }}"
          STYLE="${{ inputs.style }}"
          MODE="${{ inputs.mode }}"
          DEVICE="${{ inputs.device_codename }}"
          CUSTOM="${{ inputs.custom_codename }}"

          ARGS=(
            --rom-url "$ROM_URL"
            --style "$STYLE"
            --soc mtk
            --mode "$MODE"
            --device-codename "$DEVICE"
          )

          if [ "$DEVICE" = "custom" ] && [ -n "$CUSTOM" ]; then
            ARGS+=(--custom-codename "$CUSTOM")
          fi

          if [ "${{ inputs.keep_workspace }}" = "true" ]; then
            ARGS+=(--keep-workspace)
          fi

          if [ "${{ inputs.upload_pixeldrain }}" = "true" ]; then
            echo "[DeadZone] PixelDrain upload is reserved for the next stage and is not wired yet."
          fi

          if [ "${{ inputs.notify_telegram }}" = "true" ]; then
            echo "[DeadZone] Telegram notification is reserved for the next stage and is not wired yet."
          fi

          python3 -m factory.deadzone "${ARGS[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: deadzone-mtk-output
          path: output/workspace/final/*
