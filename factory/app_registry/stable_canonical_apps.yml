# =========================================================
# Deferred build.prop rules (not applied in this stage)
# =========================================================
deferred_build_prop_rules:
  - partition: system
    file: build.prop
    action: replace
    key: ro.build.host
    value: xiaomi.deadzone
    source_line: "ro.build.host=xiaomi.deadzone"

  - partition: system
    file: build.prop
    action: replace
    key: ro.product.locale
    value: en-GB
    source_line: "ro.product.locale=en-GB"

  - partition: system
    file: build.prop
    action: remove
    key: ro.miui.has_security_keyboard
    value: "1"
    source_line: "ro.miui.has_security_keyboard=1"

  - partition: system
    file: build.prop
    action: remove
    key: ro.miui.support_miui_ime_bottom
    value: "1"
    source_line: "ro.miui.support_miui_ime_bottom=1"
