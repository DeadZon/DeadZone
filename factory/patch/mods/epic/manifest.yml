id: epic
display_name: Epic
enabled: true

supported_platforms:
  - os3_a16
  - os3_a15
  - os2_a15

stages:
  - build_package
  - props
  - debloat
  - permissions
  - apk

build_package:
  path: build/
  required: false
  env: EPIC_BUILD_URL
  allowed_partitions:
    - system
    - product
    - system_ext
    - vendor
    - odm
    - mi_ext

profiles:
  os2_a15: profiles/os2_a15.yml
  os3_a15: profiles/os3_a15.yml
  os3_a16: profiles/os3_a16.yml
