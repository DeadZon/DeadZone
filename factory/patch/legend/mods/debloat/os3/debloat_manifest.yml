# ─────────────────────────────────────────────────────────────────────────────
# MOVE DATA-APP TO APP
# Step 8-9: filter product/data-app (remove_packages runs first), then move
#           remaining folders to product/app.
# MUST run BEFORE remove_paths deletes product/data-app entries.
# The executor enforces this ordering internally.
# ─────────────────────────────────────────────────────────────────────────────
move_data_app_to_app:
  enabled: true
  src: product/data-app
  dst: product/app
  note: Move remaining product/data-app apps to product/app after filtering

# ─────────────────────────────────────────────────────────────────────────────
# OVERLAY PATCHES  (APK resource patches)
# If APK resource patching is not yet supported, the executor logs a WARNING
# and does NOT corrupt any APK.
# ─────────────────────────────────────────────────────────────────────────────
overlay_patches:
  - target: product/overlay/GestureLineOverlay.apk
    resource_type: dimen
    resource_name: navigation_bar_frame_height
    old_value: "16.0dp"
    new_value: "32.0dp"
    note: Increase gesture navigation bar frame height for Legend OS3 (16dp -> 32dp)

# ─────────────────────────────────────────────────────────────────────────────
# CLEAN PATTERNS  (optional ART/OAT/vdex/fsv_meta cleanup)
# Each pattern is gated by its option flag.  All default to false except
# remove_fsv_meta which is enabled for Legend OS3.
# ─────────────────────────────────────────────────────────────────────────────
clean_patterns:
  options:
    remove_fsv_meta: true    # safe for Legend OS3 — redundant signing metadata
    remove_oat: false        # risk: boot slowdown on first run; keep disabled
    remove_vdex: false       # risk: forces dex2oat on boot; keep disabled
    remove_art: false        # risk: forces re-optimisation on first boot
    remove_profiles: false   # risk: removes compilation hints; keep disabled

  patterns:
    - ext: "*.fsv_meta"
      option: remove_fsv_meta
      partitions: [system, system_ext, product]

    - ext: "*.oat"
      option: remove_oat
      partitions: [system, system_ext, product]

    - ext: "*.vdex"
      option: remove_vdex
      partitions: [system, system_ext, product]

    - ext: "*.art"
      option: remove_art
      partitions: [system, system_ext, product]

    - ext: "*.prof"
      option: remove_profiles
      partitions: [system, system_ext, product]

# ─────────────────────────────────────────────────────────────────────────────
# PROTECTED PATHS  (NEVER removed unless listed in risky_optional_removals
#                   with enabled: true)
# Patterns use fnmatch glob syntax, matched against the relative path from
# the ROM root with forward slashes.
# ─────────────────────────────────────────────────────────────────────────────
protected_paths:
  - pattern: "**/MtkTeleService/**"
    reason: MTK telephony service — critical for calls and SIM registration
  - pattern: "**/TeleService/**"
    reason: Telephony service — critical for calls and SIM registration
  - pattern: "**/MtkTelecom/**"
    reason: MTK Telecom stack — critical for call management
  - pattern: "**/Telecom/**"
    reason: Telecom stack — critical for call management
  - pattern: "**/MtkTelephonyProvider/**"
    reason: MTK telephony provider — critical for SMS and call logs
  - pattern: "**/TelephonyProvider/**"
    reason: Telephony provider — critical for SMS and call logs
  - pattern: "**/GbaService/**"
    reason: GBA authentication — required for carrier/IMS services
  - pattern: "**/CapCtrl/**"
    reason: Capability control — MTK telephony capability negotiation
  - pattern: "**/TelephonyAssist/**"
    reason: Telephony assist — carrier-specific helper service
  - pattern: "**/MmsService/**"
    reason: MMS service — critical for MMS messaging
  - pattern: "**/MtkMmsService/**"
    reason: MTK MMS — renamed to MmsService in move_paths; do NOT delete
  - pattern: "**/Stk/**"
    reason: SIM Toolkit — critical for SIM application functionality
  - pattern: "**/Stk1/**"
    reason: SIM Toolkit slot 1 — critical for dual-SIM STK
  - pattern: "**/CarrierConfig/**"
    reason: Carrier configuration — required for network/APN settings
  - pattern: "**/ImsService/**"
    reason: IMS service — required for VoLTE and VoWiFi
  - pattern: "**/ims/**"
    reason: IMS framework — required for VoLTE and VoWiFi
  - pattern: "**/volte/**"
    reason: VoLTE — required for HD voice calls
  - pattern: "**/wfc/**"
    reason: WiFi calling framework — required for WFC

# ─────────────────────────────────────────────────────────────────────────────
# RISKY OPTIONAL REMOVALS
# Items from the raw TXT that touch telephony-critical components.
# NOT executed by default (enabled: false).
# Set enabled: true only after confirming the global replacement exists.
# ─────────────────────────────────────────────────────────────────────────────
risky_optional_removals:

  - path: system/priv-app/MtkTeleService
    reason: >
      Raw TXT marks MtkTeleService as removed; however global TeleService must
      already exist or calls/SIM registration will break.
    requires_present: system/priv-app/TeleService
    enabled: false

  - path: system/priv-app/MtkTelecom
    reason: >
      Raw TXT marks MtkTelecom as removed; global Telecom must exist first.
    requires_present: system/priv-app/Telecom
    enabled: false

  - path: system/priv-app/MtkTelephonyProvider
    reason: >
      Raw TXT marks MtkTelephonyProvider as removed; global TelephonyProvider
      must exist or SMS and call logs will break.
    requires_present: system/priv-app/TelephonyProvider
    enabled: false

  - path: system/priv-app/Stk1
    reason: >
      Raw TXT marks Stk1 as removed.  May break SIM Toolkit on dual-SIM slots.
    enabled: false

  - path: product/data-app/MiuiScanner
    reason: Optional CN scanner removal.  Remove if scanner is not needed.
    enabled: false

# ─────────────────────────────────────────────────────────────────────────────
# LEGEND-ONLY FEATURES  (informational — listed for audit purposes)
# ─────────────────────────────────────────────────────────────────────────────
legend_only_features:
  - name: mi_ext_product_permissions_move
    description: Move mi_ext/product/etc/permissions -> product/etc/permissions
  - name: mi_ext_system_permissions_move
    description: Move mi_ext/system/etc/permission -> system/etc/permission
  - name: product_data_app_filter_and_move
    description: Filter product/data-app (remove CN bloat) then move remainder to product/app
  - name: mtk_cn_to_global_renames
    description: Rename MtkXxx priv-app folders to their global equivalents
  - name: gesture_line_overlay_patch
    description: Patch GestureLineOverlay navigation_bar_frame_height 16dp -> 32dp

# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION ORDER  (enforced by debloat_executor.py — do not reorder here)
# ─────────────────────────────────────────────────────────────────────────────
execution_order:
  1: Verify Legend OS3 profile (guard check)
  2: Load manifest
  3: Validate ROM root directory
  4: Initialise report writer
  5: Move mi_ext useful files (permissions, messaging, framework, overlay)
  6: Move mi_ext/product/etc/permissions -> product/etc/permissions
  7: Remove unwanted mi_ext folders (bin, data-app, lib, lib64, media, opcust, priv-app, usr, etc/init)
  8: Filter product/data-app — remove unwanted CN packages
  9: Move remaining product/data-app apps -> product/app
  10: Run rename_paths (product/app CN-name -> Global-name renames)
  11: Run remove_paths (all partition removals)
  12: Run remove_packages (search-and-remove by folder name)
  13: Run clean_patterns (only if options enabled — fsv_meta by default)
  14: Run overlay_patches (log WARNING if APK patching not supported)
  15: Write final report to output/reports/deadzone_patch_report.txt

safety_notes:
  - Never remove telephony-critical paths without risky_optional_removals override
  - product/data-app must be filtered BEFORE moving remainder to product/app
  - mi_ext useful content must be moved BEFORE mi_ext cleanup runs
  - Missing paths are silently skipped — never fatal
  - dry-run mode must not touch any file on disk
  - All actions are logged to stdout and written to the patch report
  - Path traversal (../ or absolute paths outside ROM root) is blocked unconditionally
  - Overlay APK patching logs a WARNING when APKEditor support is unavailable
  - This profile must not run for Gaming, EPiC, base DeadZone, or non-OS3 builds
