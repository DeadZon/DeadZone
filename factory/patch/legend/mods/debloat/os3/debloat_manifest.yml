    - SogouInput                  # com.sohu.inputmethod.sogou.xiaomi
    - PaymentService              # com.xiaomi.payment
    - MiGameService               # com.xiaomi.migameservice
    - MSA                         # com.miui.msa.global
    - MIUIgreenguard              # com.miui.greenguard
    - MIUISuperMarket             # com.xiaomi.market
    - MIUISecurityInputMethod     # com.miui.securityinputmethod
    - MIUIAiasstService           # com.xiaomi.aiasst.service
    - CarWith                     # com.miui.carlink
    - AnalyticsCore               # com.miui.analytics
    - AiAsstVision                # com.xiaomi.aiasst.vision
    - CatchLog                    # com.bsp.catchlog

