    - MIUIXiaoAiSpeechEngine      # com.xiaomi.mibrain.speech
    - MIUIVirtualSim              # com.miui.virtualsim
    - MIUIVipAccount              # com.xiaomi.vipaccount
    - MIUIVideo                   # com.miui.video  (use Eu or Gl build)
    - MIUINotes                   # com.miui.notes
    - MIUINewHome                 # com.miui.newhome
    - MIUIMusicT                  # com.miui.player
    - MIUIMiDrive                 # com.miui.newmidrive
    - MIUIHuanji                  # com.miui.huanji
