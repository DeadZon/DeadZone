# Legend OS3 CN-to-Global Debloat / Conversion Manifest
#
# SOURCE: Legend/Legend OS3 Debloat Profile.txt  (human-written reference plan)
# This YAML is NOT executed directly — debloat_executor.py reads and enforces it.
#
# Guard: runs ONLY when flavor=legend, os_family in [OS3, HyperOS3],
#         debloat_profile=legend_os3.
# Must NOT run for: Gaming, EPiC, base DeadZone, common profiles, other OS versions.

profile:
  name: legend_os3_debloat
  flavor: legend
  os_family:
    - OS3
    - HyperOS3
  debloat_profile: legend_os3
  description: >
    Legend OS3 CN-to-Global debloat and conversion profile.
    Reorganises mi_ext, product, system, and system_ext partitions
    for global deployment.  Legend-only — must not run for Gaming, EPiC,
    or base DeadZone profiles.

# ─────────────────────────────────────────────────────────────────────────────
# MOVE PATHS  (executed FIRST — before any removals)
# src and dst are relative to the unpacked ROM root.
# merge: true  ->  contents of src/ are merged into dst/ (existing files kept).
# merge: false ->  src/ is renamed/moved wholesale to dst/.
# ─────────────────────────────────────────────────────────────────────────────
move_paths:

  # ── Step 5-6: mi_ext useful content -> product/system partitions ───────────
  - src: mi_ext/product/etc/permissions
    dst: product/etc/permissions
    merge: true
    note: Move mi_ext product permissions to product/etc/permissions

  - src: mi_ext/system/etc/permission
    dst: system/etc/permission
    merge: true
    note: Move mi_ext system permissions to system/etc/permission

  - src: mi_ext/product/app/messaging
    dst: product/app/messaging
    merge: false
    note: Move messaging app from mi_ext/product/app to product/app

  - src: mi_ext/product/framework
    dst: product/framework
    merge: true
    note: Move mi_ext product framework to product/framework

  - src: mi_ext/product/overlay
    dst: product/overlay
    merge: true
    note: Move mi_ext product overlay entries to product/overlay

  # ── system/priv-app: MTK CN -> Global name renames ────────────────────────
  # MtkMmsService is renamed to MmsService (global equivalent).
  # The folder rename happens BEFORE MtkMmsService is listed in remove_paths,
  # so the old path will already be gone after this move.
  - src: system/priv-app/MtkMmsService
    dst: system/priv-app/MmsService
    merge: false
    note: Rename MtkMmsService -> MmsService (global name)

  # Move the MTK TeleService native lib into the global TeleService folder.
  # TeleService folder itself is in risky_optional_removals — this lib move
  # is safe because TeleService (global) is expected to already exist.
  - src: system/priv-app/MtkTeleService/lib/arm64/libc++.so
    dst: system/priv-app/TeleService/lib/arm64/libc++.so
    merge: false
    note: Move MtkTeleService native lib into TeleService

  # ── system_ext/priv-app: MTK CN -> Global name renames ───────────────────
  - src: system_ext/priv-app/MtkCapCtrl
    dst: system_ext/priv-app/CapCtrl
    merge: false
    note: Rename MtkCapCtrl -> CapCtrl

  - src: system_ext/priv-app/MtkGbaService
    dst: system_ext/priv-app/GbaService
    merge: false
    note: Rename MtkGbaService -> GbaService

  - src: system_ext/priv-app/MtkTelephonyAssist
    dst: system_ext/priv-app/TelephonyAssist
    merge: false
    note: Rename MtkTelephonyAssist -> TelephonyAssist

# ─────────────────────────────────────────────────────────────────────────────
# RENAME PATHS  (within-partition folder renames, e.g. product/app)
# Executed AFTER move_paths, BEFORE remove_paths.
# ─────────────────────────────────────────────────────────────────────────────
rename_paths:

  # product/app CN-name -> Global-name renames
  - src: product/app/Biometric
    dst: product/app/MiuiBiometric
    note: Biometric -> MiuiBiometric

  - src: product/app/CameraTools_beta
    dst: product/app/CameraTools
    note: CameraTools_beta -> CameraTools

  - src: product/app/FidoAuthen2
    dst: product/app/FidoAuthen
    note: FidoAuthen2 -> FidoAuthen

  - src: product/app/MIUIDeskClock
    dst: product/app/DeskClock
    note: MIUIDeskClock -> DeskClock

  - src: product/app/MIUIGuardProvider
    dst: product/app/GuardProvider
    note: MIUIGuardProvider -> GuardProvider

  - src: product/app/MIUIMiCloudSync
    dst: product/app/MiCloudSync
    note: MIUIMiCloudSync -> MiCloudSync

  - src: product/app/MIUISecurityAdd
    dst: product/app/SecurityAdd
    note: MIUISecurityAdd -> SecurityAdd

  - src: product/app/MIUITouchAssistant
    dst: product/app/TouchAssistant
    note: MIUITouchAssistant -> TouchAssistant

  - src: product/app/MiBugReportOS3
    dst: product/app/MiBugReport
    note: MiBugReportOS3 -> MiBugReport

  - src: product/app/XMSFKeeperAll
    dst: product/app/XmsfKeeper
    note: XMSFKeeperAll -> XmsfKeeper

  - src: product/app/com.xiaomi.macro
    dst: product/app/MiMacro
    note: com.xiaomi.macro -> MiMacro

# ─────────────────────────────────────────────────────────────────────────────
# REMOVE PATHS  (executed AFTER move_paths + rename_paths)
# Paths relative to ROM root.  Missing paths are silently skipped.
# ─────────────────────────────────────────────────────────────────────────────
remove_paths:

  # ── mi_ext cleanup (after useful content has been moved out) ─────────────
  - path: mi_ext/product/bin
    note: Remove mi_ext/product/bin
  - path: mi_ext/product/data-app
    note: Remove mi_ext/product/data-app
  - path: mi_ext/product/lib
    note: Remove mi_ext/product/lib
  - path: mi_ext/product/lib64
    note: Remove mi_ext/product/lib64
  - path: mi_ext/product/media
    note: Remove mi_ext/product/media
  - path: mi_ext/product/opcust
    note: Remove mi_ext/product/opcust
  - path: mi_ext/product/priv-app
    note: Remove mi_ext/product/priv-app
  - path: mi_ext/product/usr
    note: Remove mi_ext/product/usr
  - path: mi_ext/etc/init
    note: Remove mi_ext/etc/init folder

  # ── product/app CN removals ──────────────────────────────────────────────
