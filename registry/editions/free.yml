id: free
display_name: DeadZone Free
output_suffix: ""
runner: factory.pipeline.free_pipeline
build_url_env: FREE_BUILD_URL
enabled: true
required: false

# Mod flags — all disabled for Free edition
apply_mods: false
apply_legend_mods: false
apply_gaming_mods: false
apply_epic_mods: false
debloat: false
patch_apks: false
patch_jars: false
patch_smali: false

# Intake flags
keep_rom_close_to_stock: true
use_universal_intake: true

description: >
  DeadZone Free edition. Universal ROM intake and fastboot builder — no mods applied.
  Detects, unpacks, collects images, rebuilds super, packages fastboot ZIP.
  Supports: payload_ota, fastboot_tgz, fastboot_tar, images_zip, xiaomi_eu_zip,
  split_super_zip, new_dat_br_zip, raw_super_zip.
  Output name: DeadZone_<codename>_V1
