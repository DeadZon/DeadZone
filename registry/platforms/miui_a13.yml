id: miui_a13
name: MIUI Android 13
android: 13
family: miui
generation: MIUI

asset_key: MIUI_A13
asset_manifest: assets/manifests/miui_a13.json

patchpacks:
  common:
    - common/base
    - common/deadzone_brand
  platform:
    - platforms/miui_a13

partitions:
  supports:
    - system
    - product
    - system_ext
    - vendor
    - odm

framework_rules:
  jar_patch_level: legacy
  apktool_mode: aapt2
  signature_bypass: supported

super:
  filesystem: ext4
  output_format: sparse
