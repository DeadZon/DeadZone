id: os2_a14
name: HyperOS 2 Android 14
android: 14
family: hyperos
generation: OS2

asset_key: OS2_A14
asset_manifest: assets/manifests/os2_a14.json

patchpacks:
  common:
    - common/base
    - common/deadzone_brand
  platform:
    - platforms/os2_a14

partitions:
  supports:
    - system
    - product
    - system_ext
    - vendor
    - odm
    - mi_ext

framework_rules:
  jar_patch_level: modern
  apktool_mode: aapt2
  signature_bypass: supported

super:
  filesystem: erofs
  output_format: sparse
