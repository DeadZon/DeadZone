id: os3_a16
name: HyperOS 3 Android 16
android: 16
family: hyperos
generation: OS3

asset_key: OS3_A16
asset_manifest: assets/manifests/os3_a16.json

patchpacks:
  common:
    - common/base
    - common/deadzone_brand
  platform:
    - platforms/os3_a16

partitions:
  supports:
    - system
    - product
    - system_ext
    - vendor
    - odm
    - mi_ext

framework_rules:
  jar_patch_level: modern
  apktool_mode: aapt2
  signature_bypass: supported

super:
  filesystem: erofs
  output_format: sparse
