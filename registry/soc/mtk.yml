id: mtk
name: MediaTek

defaults:
  super_size: 9126805504
  slot_mode: VAB
  super_output_format: sparse

default_dynamic_group: qti_dynamic_partitions
default_slot_mode: vab
default_flash_profile: mtk_vab
default_vbmeta_policy: binary_flags_3

engine:
  name: mtk_engine
  base: mezo_legacy_engine

required_images:
  - apusys.img
  - audio_dsp.img
  - boot.img
  - ccu.img
  - connsys_bt.img
  - connsys_gnss.img
  - connsys_wifi.img
  - dpm.img
  - dtbo.img
  - gpueb.img
  - gz.img
  - init_boot.img
  - lk.img
  - logo.img
  - mcf_ota.img
  - mcupm.img
  - md1img.img
  - mvpu_algo.img
  - pi_img.img
  - scp.img
  - spmfw.img
  - sspm.img
  - tee.img
  - vbmeta.img
  - vbmeta_system.img
  - vbmeta_vendor.img
  - vcp.img
  - vendor_boot.img
  - super.img

optional_images:
  - preloader_raw.img

forbidden_flash_commands:
  - "fastboot -w"
  - "flash preloader"
  - "flash persist"
  - "--disable-verity"
  - "--disable-verification"
