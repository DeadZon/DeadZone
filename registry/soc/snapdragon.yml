id: snapdragon
name: Qualcomm Snapdragon

defaults:
  super_size: 9126805504
  slot_mode: VAB
  super_output_format: sparse

default_dynamic_group: qti_dynamic_partitions
default_slot_mode: vab
default_flash_profile: snapdragon_vab
default_vbmeta_policy: binary_flags_3

engine:
  name: snapdragon_engine
  base: mezo_legacy_engine

required_images:
  - boot.img
  - init_boot.img
  - vendor_boot.img
  - vbmeta.img
  - super.img

optional_images:
  - dtbo.img
  - vbmeta_system.img
  - vbmeta_vendor.img
  - logo.img

forbidden_flash_commands:
  - "fastboot -w"
  - "flash preloader"
  - "flash persist"
  - "--disable-verity"
  - "--disable-verification"
