codename: garnet
brand: Redmi
model: Redmi Note 13 Pro 5G

soc: snapdragon
platforms_supported:
  - os3_a16
  - os3_a15
  - os2_a15
  - os2_a14

default_platform: os3_a16
default_flavor: deadzone

super:
  source: mezo_superconfig
  dynamic_group: qti_dynamic_partitions
  slot_mode: vab
  filesystem: erofs
  output_format: sparse

required_images:
  - boot.img
  - init_boot.img
  - vendor_boot.img
  - vbmeta.img
  - super.img

optional_images:
  - dtbo.img
  - logo.img
  - vbmeta_system.img
  - vbmeta_vendor.img

flash_profile: snapdragon_vab
vbmeta_policy: binary_flags_3
