codename: zircon
brand: Redmi
model: Redmi Note 13 Pro+ 5G

soc: mtk
platforms_supported:
  - os3_a16
  - os3_a15
  - os2_a15

default_platform: os3_a16
default_flavor: deadzone

super:
  source: auto_or_mezo_superconfig
  dynamic_group: qti_dynamic_partitions
  super_size: 9126805504
  slot_mode: vab
  active_slot: a
  inactive_slot_zero: true
  filesystem: erofs
  output_format: sparse
  metadata_slots: 3

required_images:
  - boot.img
  - init_boot.img
  - vendor_boot.img
  - vbmeta.img
  - super.img

optional_images:
  - dtbo.img
  - logo.img
  - vbmeta_system.img
  - vbmeta_vendor.img

flash_profile: mtk_vab
vbmeta_policy: binary_flags_3
